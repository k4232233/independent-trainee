<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>欢迎来到 akiei.cn</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #fff5f7 0%, #ffe8f0 50%, #ffd4e5 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        /* 背景樱花装饰 */
        body::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(255, 182, 193, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(255, 192, 203, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 40% 80%, rgba(255, 160, 180, 0.1) 0%, transparent 50%);
            animation: float 20s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            33% { transform: translate(30px, -30px) rotate(5deg); }
            66% { transform: translate(-20px, 20px) rotate(-5deg); }
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 60px 50px;
            box-shadow: 
                0 20px 60px rgba(255, 105, 135, 0.15),
                0 0 0 1px rgba(255, 182, 193, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.9);
            position: relative;
            z-index: 1;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 1s ease-out forwards;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .profile-section {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeInUp 1s ease-out 0.2s forwards;
            opacity: 0;
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin: 0 auto 24px;
            border: 4px solid rgba(255, 182, 193, 0.3);
            box-shadow: 
                0 8px 32px rgba(255, 105, 135, 0.2),
                0 0 0 8px rgba(255, 255, 255, 0.5),
                inset 0 0 20px rgba(255, 182, 193, 0.1);
            object-fit: cover;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .avatar:hover {
            transform: scale(1.05) rotate(5deg);
            box-shadow: 
                0 12px 48px rgba(255, 105, 135, 0.3),
                0 0 0 8px rgba(255, 255, 255, 0.8),
                inset 0 0 30px rgba(255, 182, 193, 0.2);
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ff6b9d 0%, #ff8fab 50%, #ffa6c1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 16px;
            letter-spacing: -0.02em;
        }

        .subtitle {
            font-size: 1.1rem;
            color: #d4526e;
            margin-bottom: 12px;
            font-weight: 500;
        }

        .description {
            font-size: 1rem;
            color: #8b5a6f;
            line-height: 1.6;
            margin-bottom: 40px;
            animation: fadeInUp 1s ease-out 0.4s forwards;
            opacity: 0;
        }

        .card {
            background: linear-gradient(135deg, rgba(255, 240, 245, 0.8) 0%, rgba(255, 228, 240, 0.8) 100%);
            border-radius: 20px;
            padding: 32px;
            margin-bottom: 24px;
            border: 1px solid rgba(255, 182, 193, 0.2);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            animation: fadeInUp 1s ease-out 0.6s forwards;
            opacity: 0;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(255, 182, 193, 0.1) 0%, transparent 100%);
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .card:hover::before {
            opacity: 1;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 
                0 20px 40px rgba(255, 105, 135, 0.2),
                0 0 0 1px rgba(255, 182, 193, 0.3);
            border-color: rgba(255, 182, 193, 0.4);
        }

        .card h2 {
            font-size: 1.5rem;
            color: #d4526e;
            margin-bottom: 12px;
            font-weight: 600;
            position: relative;
            z-index: 1;
        }

        .card p {
            color: #8b5a6f;
            line-height: 1.6;
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
        }

        .button {
            display: inline-block;
            background: linear-gradient(135deg, #ff6b9d 0%, #ff8fab 100%);
            color: white;
            padding: 14px 32px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 16px rgba(255, 105, 135, 0.3);
            position: relative;
            z-index: 1;
            border: none;
            cursor: pointer;
        }

        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(255, 105, 135, 0.4);
            background: linear-gradient(135deg, #ff5a8c 0%, #ff7a9a 100%);
        }

        .button:active {
            transform: translateY(0);
        }

        .contact-section {
            text-align: center;
            padding-top: 32px;
            border-top: 1px solid rgba(255, 182, 193, 0.2);
            animation: fadeInUp 1s ease-out 0.8s forwards;
            opacity: 0;
        }

        .contact-section h3 {
            font-size: 1.2rem;
            color: #d4526e;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .social-links {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .social-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: rgba(255, 240, 245, 0.6);
            border: 1px solid rgba(255, 182, 193, 0.3);
            border-radius: 10px;
            color: #d4526e;
            text-decoration: none;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .social-link:hover {
            background: rgba(255, 182, 193, 0.3);
            border-color: rgba(255, 182, 193, 0.5);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 105, 135, 0.2);
        }

        /* 樱花花瓣飘落动画 */
        .petal {
            position: fixed;
            width: 12px;
            height: 12px;
            background: radial-gradient(circle at 30% 30%, rgba(255, 182, 193, 0.9), rgba(255, 192, 203, 0.7));
            border-radius: 50% 0 50% 0;
            pointer-events: none;
            z-index: 0;
            animation: fall linear infinite;
            opacity: 0.7;
            filter: blur(0.5px);
        }

        @keyframes fall {
            0% {
                transform: translateY(-100px) rotate(0deg) translateX(0);
                opacity: 0.7;
            }
            50% {
                opacity: 0.9;
            }
            100% {
                transform: translateY(100vh) rotate(360deg) translateX(100px);
                opacity: 0;
            }
        }

        @media (max-width: 640px) {
            .container {
                padding: 40px 30px;
            }

            h1 {
                font-size: 2rem;
            }

            .card {
                padding: 24px;
            }

            .social-links {
                flex-direction: column;
                align-items: stretch;
            }

            .social-link {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="profile-section">
            <img src="https://hebbkx1anhila5yf.public.blob.vercel-storage.com/white-h2DBywfmrMhBCXHahe4KKH9bYxB1hb.jpg" alt="Profile Avatar" class="avatar">
            <h1>欢迎来到 akiei.cn</h1>
            <p class="subtitle">在樱花飘落的季节，与你相遇</p>
        </div>

        <p class="description">
            这里是我的个人空间，记录生活点滴，分享技术心得，探索美好世界。
        </p>

        <div class="card">
            <h2>我的博客</h2>
            <p>在这里分享我的想法、经验和创作。欢迎来访，一起交流学习。</p>
            <a href="https://blog.huiyi.asia" class="button">访问博客</a>
        </div>

        <div class="contact-section">
            <h3>联系方式</h3>
            <div class="social-links">
                <a href="mailto:contact@huiyi.asia" class="social-link">
                    <span>📧</span>
                    <span>邮箱</span>
                </a>
                <a href="https://github.com/yourusername" class="social-link">
                    <span>💻</span>
                    <span>GitHub</span>
                </a>
                <a href="https://bilili.com/yourusername" class="social-link">
                    <span>🐦</span>
                    <span>Bilil</span>
                </a>
            </div>
        </div>
    </div>

    <script>
        // 创建樱花花瓣飘落效果
        function createPetal() {
            const petal = document.createElement('div');
            petal.className = 'petal';
            
            // 随机位置
            petal.style.left = Math.random() * window.innerWidth + 'px';
            
            // 随机大小
            const size = Math.random() * 8 + 8;
            petal.style.width = size + 'px';
            petal.style.height = size + 'px';
            
            // 随机动画时长
            const duration = Math.random() * 10 + 10;
            petal.style.animationDuration = duration + 's';
            
            // 随机延迟
            petal.style.animationDelay = Math.random() * 5 + 's';
            
            document.body.appendChild(petal);
            
            // 动画结束后移除元素
            setTimeout(() => {
                petal.remove();
            }, (duration + 5) * 1000);
        }

        // 初始创建一些花瓣
        for (let i = 0; i < 15; i++) {
            setTimeout(() => createPetal(), i * 500);
        }

        // 持续创建新花瓣
        setInterval(() => {
            createPetal();
        }, 2000);

        // 添加平滑滚动
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    target.scrollIntoView({
                        behavior: 'smooth',
                        block: 'start'
                    });
                }
            });
        });
    </script>
</body>
</html>
