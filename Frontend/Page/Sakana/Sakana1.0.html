<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>欢迎来到 akiei.cn</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #fff5f7 0%, #ffe8f0 50%, #ffd4e5 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 60px 50px;
            box-shadow:
                0 20px 60px rgba(255, 105, 135, 0.15),
                0 0 0 1px rgba(255, 182, 193, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.9);
            position: relative;
            z-index: 1;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 1s ease-out forwards;
            /* margin: 0 auto; */
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .profile-section {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeInUp 1s ease-out 0.2s forwards;
            opacity: 0;
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin: 0 auto 24px;
            border: 4px solid rgba(255, 182, 193, 0.3);
            box-shadow:
                0 8px 32px rgba(255, 105, 135, 0.2),
                0 0 0 8px rgba(255, 255, 255, 0.5),
                inset 0 0 20px rgba(255, 182, 193, 0.1);
            object-fit: cover;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .avatar:hover {
            transform: scale(1.05) rotate(5deg);
            box-shadow:
                0 12px 48px rgba(255, 105, 135, 0.3),
                0 0 0 8px rgba(255, 255, 255, 0.8),
                inset 0 0 30px rgba(255, 182, 193, 0.2);
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ff6b9d 0%, #ff8fab 50%, #ffa6c1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 16px;
            letter-spacing: -0.02em;
        }

        .subtitle {
            font-size: 1.1rem;
            color: #d4526e;
            margin-bottom: 12px;
            font-weight: 500;
        }

        .description {
            font-size: 1rem;
            color: #8b5a6f;
            line-height: 1.6;
            margin-bottom: 40px;
            animation: fadeInUp 1s ease-out 0.4s forwards;
            opacity: 0;
        }

        .card {
            background: linear-gradient(135deg, rgba(255, 240, 245, 0.8) 0%, rgba(255, 228, 240, 0.8) 100%);
            border-radius: 20px;
            padding: 32px;
            margin-bottom: 24px;
            border: 1px solid rgba(255, 182, 193, 0.2);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            animation: fadeInUp 1s ease-out 0.6s forwards;
            opacity: 0;
            position: relative;
            overflow: hidden;
            /* [新增] 玻璃特效过渡基础 */
            /* backdrop-filter: blur(0px); 
            -webkit-backdrop-filter: blur(0px); */
            /* will-change: transform, box-shadow, backdrop-filter; 性能优化 */
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(255, 182, 193, 0.1) 0%, transparent 100%);
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .card:hover::before {
            opacity: 1;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow:
                0 20px 40px rgba(255, 105, 135, 0.2),
                0 0 0 1px rgba(255, 182, 193, 0.3);
            border-color: rgba(255, 182, 193, 0.4);
            /* [修改] 边框颜色更亮，增强玻璃感 */
            /* border-color: rgba(255, 255, 255, 0.6); */
            /* [新增] 玻璃特效的核心 */
            /* backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px); */
            /* [新增] 悬停时背景更透明，像毛玻璃 */
            /* background: linear-gradient(135deg, rgba(255, 255, 255, 0.4) 0%, rgba(255, 255, 255, 0.3) 100%); */
        }

        .card h2 {
            font-size: 1.5rem;
            color: #d4526e;
            margin-bottom: 12px;
            font-weight: 600;
            position: relative;
            z-index: 1;
        }

        .card p {
            color: #8b5a6f;
            line-height: 1.6;
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
        }

        .button {
            display: inline-block;
            background: linear-gradient(135deg, #ff6b9d 0%, #ff8fab 100%);
            color: white;
            padding: 14px 32px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 16px rgba(255, 105, 135, 0.3);
            position: relative;
            z-index: 1;
            border: none;
            cursor: pointer;
        }

        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(255, 105, 135, 0.4);
            background: linear-gradient(135deg, #ff5a8c 0%, #ff7a9a 100%);
        }

        .button:active {
            transform: translateY(0);
        }

        .contact-section {
            text-align: center;
            padding-top: 32px;
            border-top: 1px solid rgba(255, 182, 193, 0.2);
            animation: fadeInUp 1s ease-out 0.8s forwards;
            opacity: 0;
        }

        .contact-section h3 {
            font-size: 1.2rem;
            color: #d4526e;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .social-links {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .social-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: rgba(255, 240, 245, 0.6);
            border: 1px solid rgba(255, 182, 193, 0.3);
            border-radius: 10px;
            color: #d4526e;
            text-decoration: none;
            font-size: 0.95rem;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .social-link:hover {
            background: rgba(255, 182, 193, 0.3);
            border-color: rgba(255, 182, 193, 0.5);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 105, 135, 0.2);
        }

        html .sakana-box {
            position: fixed;
            right: 0;
            bottom: 0;
            transform-origin: 100% 100%;
            /* 从右下开始变换 */
        }

        @media (max-width: 640px) {
            .container {
                padding: 40px 30px;
            }

            h1 {
                font-size: 2rem;
            }

            .card {
                padding: 24px;
            }

            .social-links {
                flex-direction: column;
                align-items: stretch;
            }

            .social-link {
                justify-content: center;
            }
        }

        .top-right-image {
            position: fixed;
            /* 固定在视口中，不随滚动条移动 */
            top: -9px;
            /* 紧贴顶部边缘 */
            right: -9px;
            /* 紧贴右侧边缘 */
            width: 400px;
            /* 增大尺寸，您可以根据 1.jpg 的实际情况调整此值，比如 250px 或 350px */
            height: auto;
            /* 自动调整高度，保持图片比例，不影响布局 */
            z-index: 999;
            /* 设置非常高的 z-index，确保它在所有内容之上 */
        }
    </style>
</head>

<body>
    <!-- Sakana引入 -->
    <div class="sakana-box"></div>

    <img src="1.png" alt="装饰图片" class="top-right-image">

    <div class="container">
        <div class="profile-section">
            <img src="https://hebbkx1anhila5yf.public.blob.vercel-storage.com/white-h2DBywfmrMhBCXHahe4KKH9bYxB1hb.jpg"
                alt="Profile Avatar" class="avatar">
            <h1>欢迎来到 akiei.cn</h1>
            <p class="subtitle">在樱花飘落的季节，与你相遇</p>
        </div>

        <p class="description">
            这里是我的个人空间，记录生活点滴，分享技术心得，探索美好世界。
        </p>

        <div class="card">
            <h2>我的博客</h2>
            <p>在这里分享我的想法、经验和创作。欢迎来访，一起交流学习。</p>
            <!-- <a href="https://blog.akiei.cn" class="button">访问博客</a> -->
            <a href="eriyi_log.html" class="button">访问博客</a>
        </div>

        <div class="contact-section">
            <h3>联系方式</h3>
            <div class="social-links">
                <a href="1476226109@qq.com" class="social-link">
                    <i class="fa-regular fa-envelope"></i>
                    <span>Email</span>
                </a>
                <a href="https://github.com/yourusername" class="social-link">
                    <i class="fa-brands fa-github"></i>
                    <span>GitHub</span>
                </a>
                <a href="https://space.bilibili.com/yourusername" class="social-link">
                    <i class="fab fa-bilibili"></i>
                    <span>Bilibili</span>
                </a>
            </div>
        </div>
    </div>

    <script>
        // 添加平滑滚动
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    target.scrollIntoView({
                        behavior: 'smooth',
                        block: 'start'
                    });
                }
            });
        });
    </script>

    <!-- 引入Sakura.js -->
    <script src="sakura.js"></script>

    <script src="autoload.js"></script>
    <!-- 引入Sakana -->
    <script src="https://cdn.jsdelivr.net/npm/sakana"></script>
    <script>
        Sakana.init({
            el: '.sakana-box',     // 启动元素 node 或 选择器
            scale: .5,                // 缩放倍数
            canSwitchCharacter: true,      // 允许换角色
        });
    </script>
</body>

</html>
