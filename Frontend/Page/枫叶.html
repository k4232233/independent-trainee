<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>欢迎来到 末路の绘</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #fef5f1 0%, #fde8e0 100%);
      color: #3d1f1f;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
      overflow-x: hidden;
    }

    /* 枫叶背景装饰 */
    .maple-leaf {
      position: absolute;
      opacity: 0.08;
      pointer-events: none;
      color: #c1440e;
    }

    .maple-leaf-1 {
      top: 10%;
      left: 5%;
      font-size: 120px;
      transform: rotate(-15deg);
    }

    .maple-leaf-2 {
      top: 60%;
      right: 8%;
      font-size: 100px;
      transform: rotate(25deg);
    }

    .maple-leaf-3 {
      bottom: 15%;
      left: 15%;
      font-size: 80px;
      transform: rotate(-30deg);
    }

    .container {
      max-width: 600px;
      width: 100%;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 24px;
      padding: 60px 40px;
      box-shadow: 0 20px 60px rgba(139, 35, 35, 0.15);
      position: relative;
      z-index: 1;
      opacity: 0;
      transform: translateY(20px);
      animation: fadeInUp 0.8s ease-out forwards;
    }

    @keyframes fadeInUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .header {
      text-align: center;
      margin-bottom: 48px;
      animation: fadeInUp 0.8s ease-out 0.2s forwards;
      opacity: 0;
    }

    .avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: linear-gradient(135deg, #c1440e 0%, #8b2323 100%);
      margin: 0 auto 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      color: white;
      box-shadow: 0 8px 24px rgba(193, 68, 14, 0.3);
    }

    h1 {
      font-size: 32px;
      font-weight: 700;
      color: #8b2323;
      margin-bottom: 12px;
      letter-spacing: -0.5px;
    }

    .subtitle {
      font-size: 18px;
      color: #9d5353;
      line-height: 1.6;
    }

    .content {
      margin-bottom: 40px;
      animation: fadeInUp 0.8s ease-out 0.4s forwards;
      opacity: 0;
    }

    .bio {
      font-size: 16px;
      line-height: 1.8;
      color: #5d3535;
      text-align: center;
      margin-bottom: 32px;
    }

    .card {
      background: linear-gradient(135deg, #fff5f2 0%, #ffe8e0 100%);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
      border: 2px solid transparent;
      transition: all 0.3s ease;
      cursor: pointer;
      text-decoration: none;
      display: block;
      color: inherit;
    }

    .card:hover {
      border-color: #c1440e;
      transform: translateY(-4px);
      box-shadow: 0 12px 32px rgba(193, 68, 14, 0.2);
    }

    .card-title {
      font-size: 20px;
      font-weight: 600;
      color: #8b2323;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-description {
      font-size: 14px;
      color: #9d5353;
      line-height: 1.6;
    }

    .social-links {
      display: flex;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
      animation: fadeInUp 0.8s ease-out 0.6s forwards;
      opacity: 0;
    }

    .social-link {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px 20px;
      background: white;
      border: 2px solid #f0d0c0;
      border-radius: 12px;
      color: #8b2323;
      text-decoration: none;
      font-size: 14px;
      font-weight: 500;
      transition: all 0.3s ease;
    }

    .social-link:hover {
      background: #c1440e;
      color: white;
      border-color: #c1440e;
      transform: translateY(-2px);
    }

    .icon {
      font-size: 18px;
    }

    @media (max-width: 640px) {
      .container {
        padding: 40px 24px;
      }

      h1 {
        font-size: 28px;
      }

      .subtitle {
        font-size: 16px;
      }

      .maple-leaf-1,
      .maple-leaf-2,
      .maple-leaf-3 {
        font-size: 60px;
      }
    }
  </style>
</head>
<body>
   枫叶装饰 
  <div class="maple-leaf maple-leaf-1">🍁</div>
  <div class="maple-leaf maple-leaf-2">🍁</div>
  <div class="maple-leaf maple-leaf-3">🍁</div>

  <div class="container">
    <div class="header">
      <div class="avatar">🍁</div>
      <h1>欢迎来到 huiyi.asia</h1>
      <p class="subtitle">探索、创造、分享</p>
    </div>

    <div class="content">
      <p class="bio">
        这里是我的个人空间，记录生活点滴、技术思考与创作灵感。<br>
        欢迎访问我的博客，了解更多精彩内容。
      </p>

      <a href="https://blog.huiyi.asia" class="card" target="_blank">
        <div class="card-title">
          <span class="icon">📝</span>
          访问我的博客
        </div>
        <p class="card-description">
          分享技术文章、生活感悟和创作心得
        </p>
      </a>
    </div>

    <div class="social-links">
      <a href="mailto:contact@huiyi.asia" class="social-link">
        <span class="icon">✉️</span>
        邮箱
      </a>
      <a href="#" class="social-link">
        <span class="icon">🐦</span>
        Twitter
      </a>
      <a href="#" class="social-link">
        <span class="icon">💼</span>
        GitHub
      </a>
    </div>
  </div>

  <script>
    // 添加平滑滚动效果
    document.querySelectorAll('a[href^="#"]').forEach(anchor => {
      anchor.addEventListener('click', function (e) {
        e.preventDefault();
        const target = document.querySelector(this.getAttribute('href'));
        if (target) {
          target.scrollIntoView({
            behavior: 'smooth'
          });
        }
      });
    });

    // 为卡片添加点击反馈
    document.querySelectorAll('.card').forEach(card => {
      card.addEventListener('click', function(e) {
        this.style.transform = 'scale(0.98)';
        setTimeout(() => {
          this.style.transform = '';
        }, 100);
      });
    });

    // 添加枫叶飘落动画
    function createFallingLeaf() {
      const leaf = document.createElement('div');
      leaf.textContent = '🍁';
      leaf.style.position = 'fixed';
      leaf.style.left = Math.random() * 100 + '%';
      leaf.style.top = '-50px';
      leaf.style.fontSize = (Math.random() * 20 + 20) + 'px';
      leaf.style.opacity = Math.random() * 0.5 + 0.3;
      leaf.style.pointerEvents = 'none';
      leaf.style.zIndex = '0';
      leaf.style.transition = 'all linear';
      
      document.body.appendChild(leaf);
      
      const duration = Math.random() * 5000 + 5000;
      const rotation = Math.random() * 360;
      const drift = (Math.random() - 0.5) * 200;
      
      leaf.animate([
        { 
          transform: `translateY(0) translateX(0) rotate(0deg)`,
          opacity: leaf.style.opacity
        },
        { 
          transform: `translateY(${window.innerHeight + 50}px) translateX(${drift}px) rotate(${rotation}deg)`,
          opacity: 0
        }
      ], {
        duration: duration,
        easing: 'linear'
      }).onfinish = () => {
        leaf.remove();
      };
    }

    // 每隔一段时间创建一片飘落的枫叶
    setInterval(createFallingLeaf, 3000);
    
    // 初始创建几片枫叶
    for (let i = 0; i < 3; i++) {
      setTimeout(createFallingLeaf, i * 1000);
    }
  </script>
</body>
</html>
