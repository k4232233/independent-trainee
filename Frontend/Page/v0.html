<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>欢迎来到 akiei.cn</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #fff5f7 0%, #ffe8f0 50%, #ffd4e5 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow: hidden;
        }

        .container {
            max-width: 600px;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 60px 50px;
            box-shadow: 
                0 20px 60px rgba(255, 105, 135, 0.15),
                0 0 0 1px rgba(255, 182, 193, 0.2),
                inset 0 1px 0 rgba(255, 255, 255, 0.9);
            position: relative;
            z-index: 1;
            opacity: 0;
            transform: translateY(30px);
            animation: fadeInUp 1s ease-out forwards;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .profile-section {
            text-align: center;
            margin-bottom: 40px;
            animation: fadeInUp 1s ease-out 0.2s forwards;
            opacity: 0;
        }

        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin: 0 auto 24px;
            border: 4px solid rgba(255, 182, 193, 0.3);
            box-shadow: 
                0 8px 32px rgba(255, 105, 135, 0.2),
                0 0 0 8px rgba(255, 255, 255, 0.5),
                inset 0 0 20px rgba(255, 182, 193, 0.1);
            object-fit: cover;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .avatar:hover {
            transform: scale(1.05) rotate(5deg);
            box-shadow: 
                0 12px 48px rgba(255, 105, 135, 0.3),
                0 0 0 8px rgba(255, 255, 255, 0.8),
                inset 0 0 30px rgba(255, 182, 193, 0.2);
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ff6b9d 0%, #ff8fab 50%, #ffa6c1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 16px;
            letter-spacing: -0.02em;
        }

        .subtitle {
            font-size: 1.1rem;
            color: #d4526e;
            margin-bottom: 12px;
            font-weight: 500;
        }

        .description {
            font-size: 1rem;
            color: #8b5a6f;
            line-height: 1.6;
            margin-bottom: 40px;
            animation: fadeInUp 1s ease-out 0.4s forwards;
            opacity: 0;
        }

        .card {
            background: linear-gradient(135deg, rgba(255, 240, 245, 0.8) 0%, rgba(255, 228, 240, 0.8) 100%);
            border-radius: 20px;
            padding: 32px;
            margin-bottom: 24px;
            border: 1px solid rgba(255, 182, 193, 0.2);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            animation: fadeInUp 1s ease-out 0.6s forwards;
            opacity: 0;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, rgba(255, 182, 193, 0.1) 0%, transparent 100%);
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        .card:hover::before {
            opacity: 1;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 
                0 20px 40px rgba(255, 105, 135, 0.2),
                0 0 0 1px rgba(255, 182, 193, 0.3);
            border-color: rgba(255, 182, 193, 0.4);
        }

        .card h2 {
            font-size: 1.5rem;
            color: #d4526e;
            margin-bottom: 12px;
            font-weight: 600;
            position: relative;
            z-index: 1;
        }

        .card p {
            color: #8b5a6f;
            line-height: 1.6;
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
        }

        .button {
            display: inline-block;
            background: linear-gradient(135deg, #ff6b9d 0%, #ff8fab 100%);
            color: white;
            padding: 14px 32px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1rem;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 16px rgba(255, 105, 135, 0.3);
            position: relative;
            z-index: 1;
            border: none;
            cursor: pointer;
        }

        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(255, 105, 135, 0.4);
            background: linear-gradient(135deg, #ff5a8c 0%, #ff7a9a 100%);
        }

        .button:active {
            transform: translateY(0);
        }

        .contact-section {
            text-align: center;
            padding-top: 32px;
            border-top: 1px solid rgba(255, 182, 193, 0.2);
            animation: fadeInUp 1s ease-out 0.8s forwards;
            opacity: 0;
        }

        .contact-section h3 {
            font-size: 1.2rem;
            color: #d4526e;
            margin-bottom: 20px;
            font-weight: 600;
        }

        .social-links {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
        }

        /* Updated social link styling to match card design with light pink background */
        .social-link {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            padding: 16px 24px;
            background: rgba(255, 240, 245, 0.9);
            border: 1px solid rgba(255, 182, 193, 0.25);
            border-radius: 12px;
            color: #ff6b9d;
            text-decoration: none;
            font-size: 1rem;
            transition: all 0.3s ease;
            font-weight: 500;
            min-width: 120px;
        }

        .social-link:hover {
            background: rgba(255, 228, 240, 0.95);
            border-color: rgba(255, 182, 193, 0.4);
            transform: translateY(-2px);
            box-shadow: 0 4px 16px rgba(255, 105, 135, 0.15);
        }

        /* Updated SVG icon styling for outlined icons */
        .social-link svg {
            width: 20px;
            height: 20px;
            stroke: currentColor;
            fill: none;
            flex-shrink: 0;
        }

        @media (max-width: 640px) {
            .container {
                padding: 40px 30px;
            }

            h1 {
                font-size: 2rem;
            }

            .card {
                padding: 24px;
            }

            .social-links {
                flex-direction: column;
                align-items: stretch;
            }

            .social-link {
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="profile-section">
            <img src="https://hebbkx1anhila5yf.public.blob.vercel-storage.com/white-h2DBywfmrMhBCXHahe4KKH9bYxB1hb.jpg" alt="Profile Avatar" class="avatar">
            <h1>欢迎来到 akiei.cn</h1>
            <p class="subtitle">在樱花飘落的季节,与你相遇</p>
        </div>

        <p class="description">
            这里是我的个人空间,记录生活点滴,分享技术心得,探索美好世界。
        </p>

        <div class="card">
            <h2>我的博客</h2>
            <p>在这里分享我的想法、经验和创作。欢迎来访,一起交流学习。</p>
            <a href="https://blog.huiyi.asia" class="button">访问博客</a>
        </div>

        <div class="contact-section">
            <h3>联系方式</h3>
            <div class="social-links">
                <!-- Updated to outlined envelope icon -->
                <a href="mailto:contact@huiyi.asia" class="social-link">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="2" y="4" width="20" height="16" rx="2"/>
                        <path d="M22 7l-10 7L2 7"/>
                    </svg>
                    <span>邮箱</span>
                </a>
                <!-- Updated to outlined GitHub icon -->
                <a href="https://github.com/yourusername" class="social-link">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 19c-5 1.5-5-2.5-7-3m14 6v-3.87a3.37 3.37 0 0 0-.94-2.61c3.14-.35 6.44-1.54 6.44-7A5.44 5.44 0 0 0 20 4.77 5.07 5.07 0 0 0 19.91 1S18.73.65 16 2.48a13.38 13.38 0 0 0-7 0C6.27.65 5.09 1 5.09 1A5.07 5.07 0 0 0 5 4.77a5.44 5.44 0 0 0-1.5 3.78c0 5.42 3.3 6.61 6.44 7A3.37 3.37 0 0 0 9 18.13V22"/>
                    </svg>
                    <span>GitHub</span>
                </a>
                <!-- Updated Bilibili icon to match card style -->
                <a href="https://space.bilibili.com/yourusername" class="social-link">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" fill="currentColor" stroke="none">
                        <path d="M17.813 4.653h.854c1.51.054 2.769.578 3.773 1.574 1.004.995 1.524 2.249 1.56 3.76v7.36c-.036 1.51-.556 2.769-1.56 3.773s-2.262 1.524-3.773 1.56H5.333c-1.51-.036-2.769-.556-3.773-1.56S.036 18.858 0 17.347v-7.36c.036-1.511.556-2.765 1.56-3.76 1.004-.996 2.262-1.52 3.773-1.574h.774l-1.174-1.12a1.234 1.234 0 0 1-.373-.906c0-.356.124-.658.373-.907l.027-.027c.267-.249.573-.373.92-.373.347 0 .653.124.92.373L9.653 4.44c.071.071.134.142.187.213h4.267a.836.836 0 0 1 .16-.213l2.853-2.747c.267-.249.573-.373.92-.373.347 0 .662.151.929.4.267.249.391.551.391.907 0 .355-.124.657-.373.906zM5.333 7.24c-.746.018-1.373.276-1.88.773-.506.498-.769 1.13-.786 1.894v7.52c.017.764.28 1.395.786 1.893.507.498 1.134.756 1.88.773h13.334c.746-.017 1.373-.275 1.88-.773.506-.498.769-1.129.786-1.893v-7.52c-.017-.765-.28-1.396-.786-1.894-.507-.497-1.134-.755-1.88-.773zM8 11.107c.373 0 .684.124.933.373.25.249.383.569.4.96v1.173c-.017.391-.15.711-.4.96-.249.25-.56.374-.933.374s-.684-.125-.933-.374c-.25-.249-.383-.569-.4-.96V12.44c0-.373.129-.689.386-.947.258-.257.574-.386.947-.386zm8 0c.373 0 .684.124.933.373.25.249.383.569.4.96v1.173c-.017.391-.15.711-.4.96-.249.25-.56.374-.933.374s-.684-.125-.933-.374c-.25-.249-.383-.569-.4-.96V12.44c.017-.391.15-.711.4-.96.249-.249.56-.373.933-.373Z"/>
                    </svg>
                    <span>B站</span>
                </a>
            </div>
        </div>
    </div>

    <script>
        // 添加平滑滚动(保留此功能,与樱花特效无关)
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    target.scrollIntoView({
                        behavior: 'smooth',
                        block: 'start'
                    });
                }
            });
        });
    </script>
</body>
</html>
